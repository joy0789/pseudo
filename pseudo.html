<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo</title>
    <style>
        h3{
            color: blue;
        }
        h3:hover{
            color: bisque;
            background-color: black;
            width: 5%;
        }
        .one:focus{
            color: blue;
        }
        .two:focus{
            color: brown;
            padding-left: 10px;
            outline: 0;
        }
        .three:focus{
            color: crimson;
            border: 5px solid skyblue;
        }
        a:visited{
            color: red;
        }
        li:first-child{
            color: aqua;
        }
        li:last-child{
            color: blue;
        }
        li:nth-child(2n){
            color: chocolate;
        }
    </style>
</head>
<body>
    <h3>Hello there</h3>
    <input class="one" type="text" name="" id=""> <br>
    <input class="two" type="text" name="" id=""> <br>
    <input class="three" type="text" name="" id="">
    <br>
