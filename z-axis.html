<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z-axis</title>
    <style>
        .box{
            position: relative;
        }
        .boy{
            top: 70px;
            z-index: 100;
        }
        .ring{
            z-index: 10;
        }
        .water{
            top: -80px;
            z-index: 5;
        }
    </style>
</head>
<body>
    <h3>Z Index</h3>
    <div class="swim-contanier">
        <div class="box boy">
            <img src="swim/boy.svg" alt="">
        </div>
        <div class="box ring">
            <img src="swim/ring.svg" alt="">
        </div>
        <div class="box water">
            <img src="swim/water.svg" alt="">
        </div>
    </div>
</body>
</html>
